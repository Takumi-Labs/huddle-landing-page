

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huddle Landing Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <img class="page-logo" src="images/logo.svg" alt="huddle logo" />
      </header>
      <main class="main-section">
        <img
          class="main-image"
          src="images/illustration-mockups.svg"
          alt="page illustration"
        />
        <section class="second-part">
          <h1 class="main-head poppins-semibold-italic">
            Build The Community Your Fans Will Love
          </h1>
          <p class="main-paragraph open-sans-uniquifier">
            Huddle re-imagines the way we build communities. You have a voice,
            but so does your audience. Create connections with your users as you
            engage in genuine discussion.
          </p>
          <a class="btn open-sans-uniquifier" href="#">Register</a>
        </section>
      </main>
      <footer>
        <a class="socials" href="#"
          ><img
            src="images/facebook-brands-solid-full.svg"
            alt="facebook logo" />
          <img
            src="images/square-twitter-brands-solid-full.svg"
            alt="twitter logo" />
          <img
            src="images/instagram-brands-solid-full.svg"
            alt="instagram logo"
        /></a>
      </footer>
    </div>
  </body>
</html>
